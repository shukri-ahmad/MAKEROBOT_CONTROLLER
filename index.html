<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microbit Controller</title>

<style>
  body {
    text-align: center;
    font-family: Arial;
    background: #111;
    color: white;
  }

  button {
    width: 90px;
    height: 90px;
    margin: 10px;
    font-size: 22px;
    border-radius: 12px;
    border: none;
    background: #333;
    color: white;
  }

  .pressed {
    background: lime;
    color: black;
  }

  .row {
    display: flex;
    justify-content: center;
  }

  #connect {
    width: 200px;
    height: 50px;
    background: orange;
    color: black;
  }
</style>
</head>

<body>

<h2>Microbit Controller</h2>
<button id="connect">CONNECT</button>

<div class="row">
  <button data-cmd="UP">↑</button>
</div>

<div class="row">
  <button data-cmd="LEFT">←</button>
  <button data-cmd="DOWN">↓</button>
  <button data-cmd="RIGHT">→</button>
</div>

<div class="row">
  <button data-cmd="A">A</button>
  <button data-cmd="B">B</button>
</div>

<script>
let device, characteristic;
let pressed = {};
let interval;

const UART_SERVICE = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const UART_TX = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';

// 🔥 CONNECT (FILTER SAFE)
async function connect() {
  try {
    device = await navigator.bluetooth.requestDevice({
      filters: [
        { namePrefix: "BBC micro:bit" },
        { namePrefix: "micro:bit" }
      ],
      optionalServices: ['6e400001-b5a3-f393-e0a9-e50e24dcca9e']
      
    });

    const server = await device.gatt.connect();
    const service = await server.getPrimaryService('6e400001-b5a3-f393-e0a9-e50e24dcca9e');
    characteristic = await service.getCharacteristic('6e400002-b5a3-f393-e0a9-e50e24dcca9e');

    alert("Connected: " + device.name);

  } catch (err) {
    console.error(err);
    alert("ERROR: " + err);
  }
}

document.getElementById("connect").onclick = connect;

// SEND
function send(cmd) {
  if (!characteristic) return;
  const encoder = new TextEncoder();
  characteristic.writeValue(encoder.encode(cmd + "\n"));
}

// LOOP
function startLoop() {
  if (interval) clearInterval(interval);

  interval = setInterval(() => {
    for (let key in pressed) {
      if (pressed[key]) send(key);
    }
  }, 100);
}

// PRESS
function press(cmd, el) {
  pressed[cmd] = true;
  el.classList.add("pressed");
  startLoop();
}

// RELEASE
function release(cmd, el) {
  pressed[cmd] = false;
  el.classList.remove("pressed");
}

// BUTTON EVENTS
document.querySelectorAll("button[data-cmd]").forEach(btn => {
  const cmd = btn.dataset.cmd;

  btn.onmousedown = () => press(cmd, btn);
  btn.onmouseup = () => release(cmd, btn);
  btn.onmouseleave = () => release(cmd, btn);

  btn.ontouchstart = (e) => { e.preventDefault(); press(cmd, btn); };
  btn.ontouchend = (e) => { e.preventDefault(); release(cmd, btn); };
});

// KEYBOARD
const keyMap = {
  ArrowUp: "UP",
  ArrowDown: "DOWN",
  ArrowLeft: "LEFT",
  ArrowRight: "RIGHT",
  KeyA: "A",
  KeyB: "B"
};

document.addEventListener("keydown", e => {
  const cmd = keyMap[e.code];
  if (cmd && !pressed[cmd]) {
    pressed[cmd] = true;
    const el = document.querySelector(`[data-cmd="${cmd}"]`);
    if (el) el.classList.add("pressed");
    startLoop();
  }
});

document.addEventListener("keyup", e => {
  const cmd = keyMap[e.code];
  if (cmd) {
    pressed[cmd] = false;
    const el = document.querySelector(`[data-cmd="${cmd}"]`);
    if (el) el.classList.remove("pressed");
  }
});
</script>

</body>
</html>
