<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro:bit Web Gamepad</title>
<style>
  body { font-family: sans-serif; text-align: center; padding: 20px; }
  .button {
    display: inline-block;
    font-size: 2rem;
    width: 100px;
    height: 100px;
    margin: 10px;
    background-color: #ccc;
    border-radius: 15px;
    line-height: 100px;
    user-select: none;
    cursor: pointer;
    transition: background-color 0.1s;
  }
  .pressed { background-color: #4CAF50; color: white; }
</style>
</head>
<body>
<h1>Micro:bit Web Gamepad</h1>
<button id="connectBtn">Connect to micro:bit</button>
<br><br>
<div>
  <div class="button" id="up">↑</div>
</div>
<div>
  <div class="button" id="left">←</div>
  <div class="button" id="down">↓</div>
  <div class="button" id="right">→</div>
</div>
<br>
<div>
  <div class="button" id="btnA">A</div>
  <div class="button" id="btnB">B</div>
</div>

<script>
let controlChar;
let pressedButtons = {}; // Track which buttons are pressed
let intervalId;

// Define mapping of button/key to micro:bit command
const commands = {
  up: 0x01,
  down: 0x02,
  left: 0x03,
  right: 0x04,
  btnA: 0x05,
  btnB: 0x06
};

// Key mapping for keyboard
const keyMap = {
  ArrowUp: 'up',
  ArrowDown: 'down',
  ArrowLeft: 'left',
  ArrowRight: 'right',
  KeyA: 'btnA',
  KeyB: 'btnB'
};

// Connect to micro:bit via Web Bluetooth
async function connectMicrobit() {
  try {
    
const device = await navigator.bluetooth.requestDevice({
  acceptAllDevices: true,
  optionalServices: ['e95d0753-251d-470a-a062-fa1922dfa9a8']
});
    });

    const server = await device.gatt.connect();
    const service = await server.getPrimaryService('e95d0753-251d-470a-a062-fa1922dfa9a8'); 
    controlChar = await service.getCharacteristic('e95d93ee-251d-470a-a062-fa1922dfa9a8'); // example characteristic

    alert("Connected to micro:bit!");
  } catch (err) {
    console.error(err);
    alert("Failed to connect.");
  }
}

document.getElementById('connectBtn').addEventListener('click', connectMicrobit);

// Function to start sending commands while pressed
function startSending() {
  if (intervalId) clearInterval(intervalId);
  intervalId = setInterval(() => {
    if (controlChar) {
      for (const btn in pressedButtons) {
        if (pressedButtons[btn]) {
          controlChar.writeValue(new Uint8Array([commands[btn]]));
        }
      }
    }
  }, 100); // send command every 100ms while pressed
}

// Button press/release handlers
function pressButton(btn) {
  pressedButtons[btn] = true;
  document.getElementById(btn).classList.add('pressed');
  startSending();
}

function releaseButton(btn) {
  pressedButtons[btn] = false;
  document.getElementById(btn).classList.remove('pressed');
}

// Mouse/touch events
Object.keys(commands).forEach(btn => {
  const el = document.getElementById(btn);
  el.addEventListener('mousedown', () => pressButton(btn));
  el.addEventListener('mouseup', () => releaseButton(btn));
  el.addEventListener('mouseleave', () => releaseButton(btn));
  el.addEventListener('touchstart', e => { e.preventDefault(); pressButton(btn); });
  el.addEventListener('touchend', e => { e.preventDefault(); releaseButton(btn); });
});

// Keyboard events
document.addEventListener('keydown', e => {
  const btn = keyMap[e.code];
  if (btn && !pressedButtons[btn]) pressButton(btn);
});

document.addEventListener('keyup', e => {
  const btn = keyMap[e.code];
  if (btn) releaseButton(btn);
});
</script>
</body>
</html>
