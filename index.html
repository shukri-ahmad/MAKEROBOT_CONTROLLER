<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microbit Web Gamepad</title>

<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #111;
    color: white;
  }
  button {
    width: 80px;
    height: 80px;
    margin: 10px;
    font-size: 20px;
    border-radius: 10px;
    border: none;
    background: #333;
    color: white;
    transition: transform 0.05s, background 0.1s;
  }
  button:active, .active {
    background: #ff4444 !important;
    transform: scale(0.95);
  }
  .row {
    display: flex;
    justify-content: center;
  }
  #connect {
    background: green;
    width: 200px;
  }
</style>
</head>

<body>

<h1>Microbit Gamepad</h1>
<button id="connect">Connect</button>

<div class="row">
  <button id="btn-up">↑</button>
</div>

<div class="row">
  <button id="btn-left">←</button>
  <button id="btn-down">↓</button>
  <button id="btn-right">→</button>
</div>

<div class="row">
  <button id="btn-a">A</button>
  <button id="btn-b">B</button>
</div>

<script>
let device, characteristic;

const UART_SERVICE = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const UART_RX = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

let activeIntervals = {};
let activeKeys = {};

async function connect() {
  try {
    device = await navigator.bluetooth.requestDevice({
      filters: [{ namePrefix: "BBC micro:bit" }],
      optionalServices: [UART_SERVICE]
    });

    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(UART_SERVICE);
    characteristic = await service.getCharacteristic(UART_RX);

    alert("Connected!");
  } catch (err) {
    console.error(err);
    alert("Connection failed");
  }
}

document.getElementById('connect').onclick = connect;

function highlight(id, state) {
  const btn = document.getElementById(id);
  if (!btn) return;

  if (state) btn.classList.add('active');
  else btn.classList.remove('active');
}

function send(command) {
  if (!characteristic) return;

  const encoder = new TextEncoder();
  characteristic.writeValueWithoutResponse(
    encoder.encode(command + "\n")
  );
}

// START HOLD
function startPress(command, id) {
  if (activeIntervals[id]) return;

  highlight(id, true);

  activeIntervals[id] = setInterval(() => {
    send(command);
  }, 100); // adjust speed here
}

// STOP HOLD
function stopPress(id) {
  highlight(id, false);

  if (activeIntervals[id]) {
    clearInterval(activeIntervals[id]);
    delete activeIntervals[id];
  }
}

window.onload = () => {
  const map = {
    'btn-up': 'UP',
    'btn-down': 'DOWN',
    'btn-left': 'LEFT',
    'btn-right': 'RIGHT',
    'btn-a': 'A',
    'btn-b': 'B'
  };

  Object.keys(map).forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;

    // Mouse
    el.addEventListener('mousedown', () => startPress(map[id], id));
    el.addEventListener('mouseup', () => stopPress(id));
    el.addEventListener('mouseleave', () => stopPress(id));

    // Touch
    el.addEventListener('touchstart', (e) => {
      e.preventDefault();
      startPress(map[id], id);
    });
    el.addEventListener('touchend', () => stopPress(id));
    el.addEventListener('touchcancel', () => stopPress(id));
  });
};

// Keyboard HOLD
window.addEventListener('keydown', (e) => {
  if (activeKeys[e.key]) return;
  activeKeys[e.key] = true;

  switch(e.key) {
    case 'ArrowUp': startPress('UP','btn-up'); break;
    case 'ArrowDown': startPress('DOWN','btn-down'); break;
    case 'ArrowLeft': startPress('LEFT','btn-left'); break;
    case 'ArrowRight': startPress('RIGHT','btn-right'); break;
    case 'a':
    case 'A': startPress('A','btn-a'); break;
    case 'b':
    case 'B': startPress('B','btn-b'); break;
  }
});

window.addEventListener('keyup', (e) => {
  activeKeys[e.key] = false;

  switch(e.key) {
    case 'ArrowUp': stopPress('btn-up'); break;
    case 'ArrowDown': stopPress('btn-down'); break;
    case 'ArrowLeft': stopPress('btn-left'); break;
    case 'ArrowRight': stopPress('btn-right'); break;
    case 'a':
    case 'A': stopPress('btn-a'); break;
    case 'b':
    case 'B': stopPress('btn-b'); break;
  }
});
</script>

</body>
</html>
