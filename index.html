<!DOCTYPE html>
<html>
<head>
    <title>Microbit Minimal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: white; }
        button { width: 80px; height: 80px; margin: 10px; font-size: 20px; border-radius: 10px; border: none; background: #444; color: white; touch-action: none; }
        #connect { width: 200px; height: 50px; background: #28a745; margin-bottom: 20px; }
        .active { background: #ff4444 !important; }
    </style>
</head>
<body>

    <h1>Robot Control</h1>
    <button id="connect">CONNECT</button>
    <div id="status">Status: Disconnected</div>

    <div><button id="F">↑</button></div>
    <div>
        <button id="L">←</button>
        <button id="R">→</button>
    </div>
    <div><button id="B">↓</button></div>

<script>
let uart;
const SERVICE = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const TX_CHAR = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';

document.getElementById('connect').onclick = async () => {
    try {
        const device = await navigator.bluetooth.requestDevice({
            filters: [{ namePrefix: "BBC micro:bit" }],
            optionalServices: [SERVICE]
        });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE);
        uart = await service.getCharacteristic(TX_CHAR);
        document.getElementById('status').innerText = "Status: CONNECTED";
    } catch (e) { alert("Connect Error: " + e); }
};

async function send(cmd) {
    if (!uart) return;
    try {
        // We send the letter + a SPACE to trigger the Microbit listener
        const data = new TextEncoder().encode(cmd + " ");
        await uart.writeValueWithResponse(data);
        console.log("Sent:", cmd);
    } catch (e) { console.log("Error:", e); }
}

["F", "B", "L", "R"].forEach(id => {
    const btn = document.getElementById(id);
    const start = (e) => { e.preventDefault(); btn.classList.add('active'); send(id); };
    const stop = (e) => { e.preventDefault(); btn.classList.remove('active'); send("S"); };

    btn.addEventListener('mousedown', start);
    btn.addEventListener('mouseup', stop);
    btn.addEventListener('touchstart', start);
    btn.addEventListener('touchend', stop);
});
</script>
</body>
</html>
