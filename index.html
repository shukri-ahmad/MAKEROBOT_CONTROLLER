<!DOCTYPE html>
<html>
<head>
    <title>Micro:bit Joystick</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { font-family: sans-serif; background: #111; color: white; text-align: center; touch-action: none; user-select: none; }
        .grid { display: grid; grid-template-areas: ". up ." "left stop right" ". down ."; justify-content: center; margin-top: 20px; }
        button { width: 80px; height: 80px; border: none; background: #444; color: white; border-radius: 10px; font-size: 24px; margin: 5px; }
        #connect { width: 200px; height: 50px; background: #28a745; margin: 20px; }
        .btn-a { background: #007bff; grid-area: a; }
        .btn-b { background: #6f42c1; grid-area: b; }
        .active { background: #ff4444 !important; transform: scale(0.9); }
    </style>
</head>
<body>

    <h1>Robot Control</h1>
    <button id="connect">CONNECT</button>
    <div id="status">Disconnected</div>

    <div class="grid">
        <button style="grid-area: up" id="F">↑</button>
        <button style="grid-area: left" id="L">←</button>
        <button style="grid-area: stop" id="S" style="background:#222">■</button>
        <button style="grid-area: right" id="R">→</button>
        <button style="grid-area: down" id="B">↓</button>
    </div>

    <div style="margin-top: 30px;">
        <button id="A" class="btn-a">A</button>
        <button id="X" class="btn-b">B</button>
    </div>

<script>
let uart;
const SERVICE_ID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const TX_ID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';

async function connect() {
    try {
        const device = await navigator.bluetooth.requestDevice({
            filters: [{ namePrefix: "BBC micro:bit" }],
            optionalServices: [SERVICE_ID]
        });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_ID);
        uart = await service.getCharacteristic(TX_ID);
        document.getElementById('status').innerText = "Connected!";
    } catch (e) { alert("Error: " + e); }
}

function send(cmd) {
    if (!uart) return;
    uart.writeValueWithoutResponse(new TextEncoder().encode(cmd + "\n"));
}

document.getElementById('connect').onclick = connect;

// Setup Events for all buttons
["F", "B", "L", "R", "A", "X"].forEach(id => {
    const btn = document.getElementById(id);
    
    // Start Moving
    const start = (e) => { e.preventDefault(); btn.classList.add('active'); send(id); };
    // Stop Moving
    const stop = (e) => { e.preventDefault(); btn.classList.remove('active'); send("S"); };

    btn.addEventListener('mousedown', start);
    btn.addEventListener('mouseup', stop);
    btn.addEventListener('touchstart', start);
    btn.addEventListener('touchend', stop);
});
</script>
</body>
</html>
