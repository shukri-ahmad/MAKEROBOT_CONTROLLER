<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Micro:bit Pulse Controller</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; user-select: none; touch-action: none; }
        .row { display: flex; justify-content: center; gap: 10px; margin: 10px; }
        button { 
            width: 70px; height: 70px; font-size: 20px; border-radius: 12px; 
            border: none; background: #444; color: white; cursor: pointer;
        }
        #connect { width: 200px; height: 50px; background: #28a745; margin-bottom: 20px; }
        .active { background: #ff4444 !important; transform: scale(0.9); }
        .status { margin: 10px; font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

    <h1>Micro:bit Control</h1>
    <button id="connect">CONNECT MICRO:BIT</button>
    <div id="status" class="status">Status: Disconnected</div>

    <div class="row"><button id="btn-up">↑</button></div>
    <div class="row">
        <button id="btn-left">←</button>
        <button id="btn-down">↓</button>
        <button id="btn-right">→</button>
    </div>
    <div class="row">
        <button id="btn-a">A</button>
        <button id="btn-b">B</button>
    </div>

<script>
let device, characteristic;
const UART_SERVICE = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const UART_RX = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';

const statusText = document.getElementById('status');

async function connect() {
    try {
        statusText.innerText = "Status: Searching...";
        device = await navigator.bluetooth.requestDevice({
            filters: [{ namePrefix: "BBC micro:bit" }],
            optionalServices: [UART_SERVICE]
        });

        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(UART_SERVICE);
        characteristic = await service.getCharacteristic(UART_RX);
        
        statusText.innerText = "Status: Connected!";
        document.getElementById('connect').style.background = "#555";
    } catch (err) {
        console.error(err);
        statusText.innerText = "Status: Connection Failed";
    }
}

function send(command) {
    if (!characteristic) return;
    const encoder = new TextEncoder();
    // \n is critical for the micro:bit to recognize the end of a command
    characteristic.writeValueWithoutResponse(encoder.encode(command + "\n"))
        .catch(e => console.log("Send error:", e));
}

const map = {
    'btn-up': 'UP', 'btn-down': 'DOWN', 'btn-left': 'LEFT', 
    'btn-right': 'RIGHT', 'btn-a': 'A', 'btn-b': 'B'
};

const keyMap = {
    'ArrowUp': 'btn-up', 'ArrowDown': 'btn-down', 'ArrowLeft': 'btn-left',
    'ArrowRight': 'btn-right', 'a': 'btn-a', 'b': 'btn-b'
};

function handleStart(id) {
    if (!map[id]) return;
    document.getElementById(id).classList.add('active');
    send(map[id]);
}

function handleEnd(id) {
    if (!map[id]) return;
    document.getElementById(id).classList.remove('active');
    send("STOP");
}

// Bind Events
document.getElementById('connect').onclick = connect;

Object.keys(map).forEach(id => {
    const el = document.getElementById(id);
    // Mouse
    el.addEventListener('mousedown', () => handleStart(id));
    el.addEventListener('mouseup', () => handleEnd(id));
    // Touch
    el.addEventListener('touchstart', (e) => { e.preventDefault(); handleStart(id); });
    el.addEventListener('touchend', (e) => { e.preventDefault(); handleEnd(id); });
});

// Keyboard Support
window.addEventListener('keydown', (e) => {
    const id = keyMap[e.key] || keyMap[e.key.toLowerCase()];
    if (id && !document.getElementById(id).classList.contains('active')) handleStart(id);
});
window.addEventListener('keyup', (e) => {
    const id = keyMap[e.key] || keyMap[e.key.toLowerCase()];
    if (id) handleEnd(id);
});
</script>
</body>
</html>
