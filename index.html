<!DOCTYPE html>
<html>
<head>
    <title>Microbit Debug Controller</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { font-family: sans-serif; background: #111; color: white; text-align: center; }
        .grid { display: grid; grid-template-areas: ". up ." "left . right" ". down ."; justify-content: center; gap: 10px; margin: 20px; }
        button { width: 80px; height: 80px; background: #444; color: white; border: none; border-radius: 10px; font-size: 24px; touch-action: none; }
        #connect { width: 200px; height: 50px; background: green; margin: 20px; }
        .active { background: red !important; }
    </style>
</head>
<body>

    <h1>Joystick Debug</h1>
    <button id="connect">1. CONNECT</button>
    <div id="status">Status: Not Connected</div>

    <div class="grid">
        <button style="grid-area: up" id="F">↑</button>
        <button style="grid-area: left" id="L">←</button>
        <button style="grid-area: right" id="R">→</button>
        <button style="grid-area: down" id="B">↓</button>
    </div>

    <button id="A" style="background: blue; width: 60px;">A</button>
    <button id="X" style="background: purple; width: 60px;">B</button>

<script>
let uart;
const SERVICE_ID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const TX_ID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';

// 1. Connect Logic
document.getElementById('connect').onclick = async () => {
    console.log("Connect button clicked");
    try {
        const device = await navigator.bluetooth.requestDevice({
            filters: [{ namePrefix: "BBC micro:bit" }],
            optionalServices: [SERVICE_ID]
        });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_ID);
        uart = await service.getCharacteristic(TX_ID);
        document.getElementById('status').innerText = "Status: CONNECTED";
        console.log("Bluetooth Connected & UART Ready");
    } catch (e) {
        console.log("Connection Error: " + e);
    }
};

// 2. The Send Function
async function sendData(cmd) {
    if (!uart) return;
    try {
        const encoder = new TextEncoder();
        // Change \n to a space " " to match the new Microbit code
        await uart.writeValueWithResponse(encoder.encode(cmd + " ")); 
        console.log("Sent to Microbit:", cmd);
    } catch (e) {
        console.log("Send Error:", e);
    }
}
    
// 3. Attach Events to ALL buttons
const buttons = ["F", "B", "L", "R", "A", "X"];

buttons.forEach(id => {
    const btn = document.getElementById(id);
    
    // Function for Press
    const onPress = (e) => {
        e.preventDefault();
        console.log("Button Pressed:", id);
        btn.classList.add('active');
        sendData(id);
    };

    // Function for Release
    const onRelease = (e) => {
        e.preventDefault();
        console.log("Button Released:", id);
        btn.classList.remove('active');
        sendData("S"); // Send STOP
    };

    // Mouse Events
    btn.addEventListener('mousedown', onPress);
    btn.addEventListener('mouseup', onRelease);
    
    // Touch Events (Mobile)
    btn.addEventListener('touchstart', onPress);
    btn.addEventListener('touchend', onRelease);
});

console.log("Script loaded and events attached.");
</script>
</body>
</html>
