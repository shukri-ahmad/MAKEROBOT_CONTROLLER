<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microbit Web Gamepad</title>
<style>
  body { font-family: Arial, sans-serif; text-align: center; background: #111; color: white; touch-action: manipulation; }
  button { width: 80px; height: 80px; margin: 10px; font-size: 20px; border-radius: 10px; border: none; background: #333; color: white; }
  .active { background: #ff4444 !important; transform: scale(0.95); }
  .row { display: flex; justify-content: center; }
  #connect { background: green; width: 200px; height: 50px;}
</style>
</head>
<body>

<h1>Microbit Gamepad</h1>
<button id="connect">Connect</button>

<div class="row">
  <button id="btn-up">↑</button>
</div>
<div class="row">
  <button id="btn-left">←</button>
  <button id="btn-down">↓</button>
  <button id="btn-right">→</button>
</div>
<div class="row">
  <button id="btn-a">A</button>
  <button id="btn-b">B</button>
</div>

<script>
let device, characteristic;
const UART_SERVICE = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const UART_RX = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';

async function connect() {
  try {
    device = await navigator.bluetooth.requestDevice({
      filters: [{ namePrefix: "BBC micro:bit" }],
      optionalServices: [UART_SERVICE]
    });
    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(UART_SERVICE);
    characteristic = await service.getCharacteristic(UART_RX);
    alert("Connected!");
  } catch (err) {
    alert("Connection failed");
  }
}

document.getElementById('connect').onclick = connect;

function send(command) {
  if (!characteristic) return;
  const encoder = new TextEncoder();
  characteristic.writeValueWithoutResponse(encoder.encode(command + "\n"));
}

const map = {
  'btn-up': 'UP', 'btn-down': 'DOWN', 'btn-left': 'LEFT', 
  'btn-right': 'RIGHT', 'btn-a': 'A', 'btn-b': 'B'
};

const keyMap = {
  'ArrowUp': 'btn-up', 'ArrowDown': 'btn-down', 'ArrowLeft': 'btn-left',
  'ArrowRight': 'btn-right', 'a': 'btn-a', 'b': 'btn-b'
};

// Handle Press and Release
function handleStart(id) {
    document.getElementById(id).classList.add('active');
    send(map[id]);
}

function handleEnd(id) {
    document.getElementById(id).classList.remove('active');
    send("STOP");
}

Object.keys(map).forEach(id => {
  const el = document.getElementById(id);
  // Mouse Events
  el.addEventListener('mousedown', () => handleStart(id));
  el.addEventListener('mouseup', () => handleEnd(id));
  // Touch Events
  el.addEventListener('touchstart', (e) => { e.preventDefault(); handleStart(id); });
  el.addEventListener('touchend', (e) => { e.preventDefault(); handleEnd(id); });
});

// Keyboard Events
window.addEventListener('keydown', (e) => {
  const id = keyMap[e.key.toLowerCase()] || keyMap[e.key];
  if (id && !document.getElementById(id).classList.contains('active')) {
    handleStart(id);
  }
});

window.addEventListener('keyup', (e) => {
  const id = keyMap[e.key.toLowerCase()] || keyMap[e.key];
  if (id) handleEnd(id);
});
</script>
</body>
</html>
