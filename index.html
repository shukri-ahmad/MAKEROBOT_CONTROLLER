<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microbit Web Gamepad</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #111;
    color: white;
  }
  button {
    width: 80px;
    height: 80px;
    margin: 10px;
    font-size: 20px;
    border-radius: 10px;
    border: none;
    background: #333;
    color: white;
    transition: transform 0.05s, background 0.1s;
  }
  button:active {
    background: #ff4444;
    transform: scale(0.95);
  }
  .active {
    background: #ff4444 !important;
    transform: scale(0.95);
  }
  .row {
    display: flex;
    justify-content: center;
  }
  #connect {
    background: green;
    width: 200px;
  }
</style>
</head>
<body>

<h1>Microbit Gamepad</h1>
<button id="connect">Connect</button>

<div class="row">
  <button id="btn-up" onclick="press('UP','btn-up')">↑</button>
</div>
<div class="row">
  <button id="btn-left" onclick="press('LEFT','btn-left')">←</button>
  <button id="btn-down" onclick="press('DOWN','btn-down')">↓</button>
  <button id="btn-right" onclick="press('RIGHT','btn-right')">→</button>
</div>
<div class="row">
  <button id="btn-a" onclick="press('A','btn-a')">A</button>
  <button id="btn-b" onclick="press('B','btn-b')">B</button>
</div>

<script>
let device, characteristic;

const UART_SERVICE = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const UART_TX = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';

async function connect() {
  try {
    device = await navigator.bluetooth.requestDevice({
      filters: [{ namePrefix: "BBC micro:bit" }],
      optionalServices: [UART_SERVICE]
    });

    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(UART_SERVICE);
    characteristic = await service.getCharacteristic(UART_TX);

    alert("Connected!");
  } catch (err) {
    console.error(err);
    alert("Connection failed");
  }
}

document.getElementById('connect').onclick = connect;

function highlight(id) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.classList.add('active');
  setTimeout(() => btn.classList.remove('active'), 150);
}

function send(command) {
  console.log("SEND:", command);
  if (!characteristic) return;
  const encoder = new TextEncoder();
  characteristic.writeValueWithoutResponse(encoder.encode(command + "
"));
}

// Attach events AFTER page loads
window.onload = () => {
  const map = {
    'btn-up': 'UP',
    'btn-down': 'DOWN',
    'btn-left': 'LEFT',
    'btn-right': 'RIGHT',
    'btn-a': 'A',
    'btn-b': 'B'
  };

  Object.keys(map).forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;

    // Mouse
    el.addEventListener('mousedown', () => {
      highlight(id);
      send(map[id]);
    });

    // Touch (mobile fix)
    el.addEventListener('touchstart', (e) => {
      e.preventDefault();
      highlight(id);
      send(map[id]);
    });
  });
};

// Keyboard
window.addEventListener('keydown', (e) => {
  switch(e.key) {
    case 'ArrowUp': highlight('btn-up'); send('UP'); break;
    case 'ArrowDown': highlight('btn-down'); send('DOWN'); break;
    case 'ArrowLeft': highlight('btn-left'); send('LEFT'); break;
    case 'ArrowRight': highlight('btn-right'); send('RIGHT'); break;
    case 'a': case 'A': highlight('btn-a'); send('A'); break;
    case 'b': case 'B': highlight('btn-b'); send('B'); break;
  }
});

</script>

</body>
</html>
