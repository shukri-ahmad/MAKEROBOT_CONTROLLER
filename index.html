<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microbit Web Gamepad</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #111;
    color: white;
  }
  button {
    width: 80px;
    height: 80px;
    margin: 10px;
    font-size: 20px;
    border-radius: 10px;
    border: none;
    background: #333;
    color: white;
    transition: transform 0.05s, background 0.1s;
  }
  button:active {
    background: #ff4444;
    transform: scale(0.95);
  }
  .active {
    background: #ff4444 !important;
    transform: scale(0.95);
  }
  .row {
    display: flex;
    justify-content: center;
  }
  #connect {
    background: green;
    width: 200px;
  }
</style>
</head>
<body>

<h1>Microbit Gamepad</h1>
<button id="connect">Connect</button>

<div class="row">
  <button id="btn-up" onclick="press('UP','btn-up')">↑</button>
</div>
<div class="row">
  <button id="btn-left" onclick="press('LEFT','btn-left')">←</button>
  <button id="btn-down" onclick="press('DOWN','btn-down')">↓</button>
  <button id="btn-right" onclick="press('RIGHT','btn-right')">→</button>
</div>
<div class="row">
  <button id="btn-a" onclick="press('A','btn-a')">A</button>
  <button id="btn-b" onclick="press('B','btn-b')">B</button>
</div>

<script>
let device, characteristic;

const UART_SERVICE = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const UART_TX = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';

async function connect() {
  device = await navigator.bluetooth.requestDevice({
    filters: [{ namePrefix: "BBC micro:bit" }],
    optionalServices: [UART_SERVICE]
  });

  const server = await device.gatt.connect();
  const service = await server.getPrimaryService(UART_SERVICE);
  characteristic = await service.getCharacteristic(UART_TX);

  alert("Connected!");
}

document.getElementById('connect').onclick = connect;

function press(command, id) {
  const btn = document.getElementById(id);
  if (btn) {
    btn.classList.add('active');
    setTimeout(() => btn.classList.remove('active'), 150);
  }
  send(command);
}

function send(command) {
  if (!characteristic) {
    alert("Not connected");
    return;
  }
  const encoder = new TextEncoder();
  characteristic.writeValue(encoder.encode(command + "\n"));
}
// Keyboard control
window.addEventListener('keydown', (e) => {
  switch(e.key) {
    case 'ArrowUp': press('UP','btn-up'); break;
    case 'ArrowDown': press('DOWN','btn-down'); break;
    case 'ArrowLeft': press('LEFT','btn-left'); break;
    case 'ArrowRight': press('RIGHT','btn-right'); break;
    case 'a': case 'A': press('A','btn-a'); break;
    case 'b': case 'B': press('B','btn-b'); break;
  }
});

</script>

</body>
</html>
