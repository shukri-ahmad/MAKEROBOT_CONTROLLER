<!DOCTYPE html>
<html>
<head>
    <title>MAKEROBOT CONTROLLER - Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: white; }
        .grid { display: grid; grid-template-columns: 100px 100px 100px; gap: 10px; justify-content: center; margin-top: 20px; }
        button { 
            padding: 20px; font-size: 18px; cursor: pointer; 
            user-select: none; -webkit-user-select: none; 
            background: #444; color: white; border: 2px solid #666; border-radius: 10px;
        }
        button:active { background: #00ff00; color: black; }
        .connect-btn { background: #008cba; padding: 10px 30px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>Makerobot Controller</h1>
    <button class="connect-btn" onclick="connectBT()">Connect Micro:bit</button>
    <p id="status">Status: Disconnected</p>

    <div class="grid">
        <div></div>
        <button id="btn-F">▲</button>
        <div></div>

        <button id="btn-L">◀</button>
        <button id="btn-S" style="background: #900;">■</button>
        <button id="btn-R">▶</button>

        <div></div>
        <button id="btn-B">▼</button>
        <div></div>
    </div>

    <script>
        let device, characteristic;
        let transmitInterval;
        const SEND_RATE = 100; // ms

        // --- Bluetooth Logic ---
        async function connectBT() {
            const serviceUuid = "6e400001-b5a3-f393-e0a9-e50e24dcca9e"; // UART Service
            const txUuid = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";

            try {
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'BBC micro:bit' }],
                    optionalServices: [serviceUuid]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(serviceUuid);
                characteristic = await service.getCharacteristic(txUuid);
                document.getElementById('status').innerText = "Status: Connected!";
            } catch (error) {
                console.log(error);
                alert("Connection failed. Ensure Bluetooth is on.");
            }
        }

        async function sendData(data) {
            if (!characteristic) return;
            const encoder = new TextEncoder();
            await characteristic.writeValue(encoder.encode(data));
        }

        // --- Press & Hold Logic ---
        function startAction(cmd) {
            if (transmitInterval) clearInterval(transmitInterval);
            
            sendData(cmd); // Initial send
            transmitInterval = setInterval(() => {
                sendData(cmd);
            }, SEND_RATE);
        }

        function stopAction() {
            clearInterval(transmitInterval);
            transmitInterval = null;
            sendData('S'); // Send 'S' for Stop
        }

        // --- Event Listener Mapping ---
        function setupButton(id, command) {
            const btn = document.getElementById(id);
            
            // Mouse Events
            btn.addEventListener('mousedown', () => startAction(command));
            btn.addEventListener('mouseup', stopAction);
            btn.addEventListener('mouseleave', stopAction);

            // Touch Events
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                startAction(command);
            });
            btn.addEventListener('touchend', stopAction);
        }

        // Initialize buttons
        setupButton('btn-F', 'F');
        setupButton('btn-B', 'B');
        setupButton('btn-L', 'L');
        setupButton('btn-R', 'R');
        setupButton('btn-S', 'S');

    </script>
</body>
</html>
